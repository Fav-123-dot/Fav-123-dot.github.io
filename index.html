<!DOCTYPE html>
<html>
<head>
    <title>Fav's Barbie World</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 50%, #ffc0cb 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: auto;
            border: 3px solid #fff;
            box-shadow: 0 0 25px rgba(255,20,147,0.6);
        }
        h1 { 
            color: #fff; 
            text-shadow: 2px 2px 4px #ff1493;
            font-size: 32px;
        }
        img {
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            border: 4px solid #fff;
            margin: 20px 0;
        }
        button { 
            padding: 15px 40px; 
            font-size: 18px; 
            background: #ff1493; 
            color: white; 
            border: none; 
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,20,147,0.4);
        }
        button:hover { 
            background: #fff; 
            color: #ff1493;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💖 Fav's Barbie World 💖</h1>
        <p>Welcome to my first Barbie website!</p>
        
        <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?w=400" alt="Barbie aesthetic">
        
        <p>Click for a Barbie fact:</p>
        <button onclick="alert('Barbie was created by Ruth Handler in 1959! She was named after Ruths daughter Barbara. Life in plastic, its fantastic!')">
            Barbie Power!
        </button>
        
        <p style="margin-top: 30px; font-size: 14px;">Made by Fav ✨</p>
    </div>
</body>
</html>
