<!DOCTYPE html>
<html>
<head>
    <title>Fav's Anime Zone</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: auto;
            border: 2px solid #ffbe0b;
            box-shadow: 0 0 20px rgba(255,190,11,0.5);
        }
        h1 { 
            color: #ffbe0b; 
            text-shadow: 2px 2px 4px #000;
            font-size: 32px;
        }
        img {
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            border: 3px solid #ffbe0b;
            margin: 20px 0;
        }
        button { 
            padding: 15px 40px; 
            font-size: 18px; 
            background: #ff006e; 
            color: white; 
            border: none; 
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,0,110,0.4);
        }
        button:hover { 
            background: #ffbe0b; 
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>
